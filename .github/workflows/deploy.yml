name: Deploy to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-2

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.changes.outputs.frontend }}
      backend: ${{ steps.changes.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/deploy.yml'
              - '.github/scripts/deploy-frontend.sh'
            backend:
              - 'backend/**'
              - '.github/workflows/deploy.yml'
              - '.github/scripts/deploy-backend.sh'

  deploy-frontend:
    name: Deploy Frontend
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    environment: qa
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load deploy config
        env:
          DEPLOY_QA_CONFIG: ${{ secrets.DEPLOY_QA_CONFIG }}
        run: |
          printf '%s' "$DEPLOY_QA_CONFIG" > .github/deploy-qa.json
          for key in $(jq -r 'keys[]' .github/deploy-qa.json); do
            val=$(jq -r --arg k "$key" '.[$k]' .github/deploy-qa.json)
            echo "${key}=${val}" >> "$GITHUB_ENV"
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_QA }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Frontend-${{ github.run_id }}

      - name: Deploy frontend
        run: bash .github/scripts/deploy-frontend.sh

  deploy-backend:
    name: Deploy Backend
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    environment: qa
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load deploy config
        env:
          DEPLOY_QA_CONFIG: ${{ secrets.DEPLOY_QA_CONFIG }}
        run: |
          printf '%s' "$DEPLOY_QA_CONFIG" > .github/deploy-qa.json
          for key in $(jq -r 'keys[]' .github/deploy-qa.json); do
            val=$(jq -r --arg k "$key" '.[$k]' .github/deploy-qa.json)
            echo "${key}=${val}" >> "$GITHUB_ENV"
          done

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_QA }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Backend-${{ github.run_id }}

      - name: Deploy backend
        run: bash .github/scripts/deploy-backend.sh

      - name: Smoke test
        run: |
          HEALTH_URL="${API_GATEWAY_URL%/}/v1/health"
          CODE=$(curl -sS -o /tmp/health.txt -w '%{http_code}' "$HEALTH_URL" || echo "000")
          if [ "$CODE" != "200" ]; then
            cat /tmp/health.txt || true
            exit 1
          fi
